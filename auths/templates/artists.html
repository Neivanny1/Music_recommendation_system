<form action="{{ url_for('home') }}" method="post">
    <h2>Favorite Artists</h2>
    <p>Enter your 5 favorite artists:</p>

    {% for i in range(1, 6) %}
        <label for="artist{{ i }}">Artist {{ i }}:</label>
        <input type="text" name="artist{{ i }}" required>
    {% endfor %}
<br><br>
    <input type="submit" value="Submit">
</form>
