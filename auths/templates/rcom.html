{% extends 'layout.html' %}
{% block title %}Recommended{% endblock %}
  <div class="container">
    <h2 class="text-center">Music Recommendation System</h2>
    <form action="/recom" method="post">
      <div class="form-group">
        <label for="text">Select Song</label>

        <select name="names" class="form-control">
          {% for i in name %}
          <option value="{{i}}">{{i}}</option>
          {% endfor %}
        </select>
      </div>

      <button style="margin-top:20px;" type="submit" class="btn btn-primary btn-lg">recommendation</button>
    </form>

    <div class="row">
           {% for i in songs %}
            <div class="card" style="width: 18rem;">
              <img src="{{url_for('static',filename='img.png')}}" class="card-img-top" alt="...">
              <div class="card-body">
                <h5 class="card-title">{{i}}</h5>
              </div>
            </div>
           {% endfor %}
    </div>
  </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
  </body>
</html>
